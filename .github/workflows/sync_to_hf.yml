name: Sync to Hugging Face Space

on:
  push:
    branches: [ main ] # Change to 'master' if your main branch is named master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://aasthamewar:$HF_TOKEN@huggingface.co/spaces/aasthamewar/AI-research-mentor-backend main